name: Home Suite CI

on:
  pull_request:
  push:
    branches:
      - main
      - "beta/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install portable audio runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes libportaudio2
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip wheel "setuptools<81"
          python -m pip install -r requirements.txt
      - name: Compile portable source
        run: |
          python -m compileall -q \
            -x '(^|/)(archive|\.git|\.venv)(/|$)' \
            .
      - name: Run unit and contract tests
        run: PYTHONPATH=tests/fixtures python -m unittest discover -s tests -p 'test_*.py'
      - name: Validate scripts and documentation links
        if: matrix.python-version == '3.13'
        run: |
          bash -n scripts/install.sh scripts/install_shortcuts.sh scripts/update.sh
          python tools/check_docs.py
